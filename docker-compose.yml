version: '3.8'

services:
  trading-bridge:
    build: .
    container_name: tradingview-mt5-bridge
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    volumes:
      # Optional: persist data if needed
      - ./data:/app/data
    networks:
      - trading-network

networks:
  trading-network:
    driver: bridge
